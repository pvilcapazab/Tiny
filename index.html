<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Multiverso de Tiny</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-dark:#160f2b;
    --ink-text:#3d2a5c;
    --dim-text:#8577a0;
    --card:#fffafd;
    --card-edge:#f3d3e8;
    --rosa:#ff7ab8;
    --rosa-deep:#ff4fa0;
    --celeste:#5fd0f2;
    --celeste-deep:#2fb8e6;
    --accent: var(--rosa);
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:
      radial-gradient(1200px 700px at 8% -10%, #ffd9ec 0%, transparent 62%),
      radial-gradient(1100px 700px at 96% 0%, #cdf1ff 0%, transparent 58%),
      radial-gradient(900px 600px at 50% 100%, #ffe3f2 0%, transparent 60%),
      linear-gradient(160deg, #fff2f8 0%, #f2fbff 55%, #e9f6ff 100%);
    color:var(--ink-text);
    font-family:'Space Grotesk', sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  button{font-family:inherit; -webkit-tap-highlight-color:transparent;}

  .bokeh{
    position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;
  }
  .bokeh span{
    position:absolute;
    border-radius:50%;
    filter:blur(2px);
    opacity:.35;
    animation: floaty 14s ease-in-out infinite;
  }
  .bokeh span:nth-child(1){ width:120px; height:120px; left:8%;  top:18%; background:var(--rosa); animation-duration:16s; }
  .bokeh span:nth-child(2){ width:70px;  height:70px;  left:82%; top:10%; background:var(--celeste); animation-duration:12s; animation-delay:1s; }
  .bokeh span:nth-child(3){ width:46px;  height:46px;  left:20%; top:70%; background:var(--celeste-deep); animation-duration:10s; animation-delay:2s; }
  .bokeh span:nth-child(4){ width:90px;  height:90px;  left:70%; top:65%; background:var(--rosa-deep); animation-duration:15s; animation-delay:.5s; }
  .bokeh span:nth-child(5){ width:36px;  height:36px;  left:45%; top:30%; background:var(--rosa); animation-duration:11s; animation-delay:1.5s; }
  @keyframes floaty{
    0%,100%{ transform:translateY(0) translateX(0); }
    50%{ transform:translateY(-24px) translateX(10px); }
  }

  #intro{
    position:fixed; inset:0; z-index:50;
    display:flex; align-items:center; justify-content:center;
    background:var(--ink-dark);
    overflow:hidden;
    transition:opacity .7s ease, transform .7s ease;
  }
  #intro.leaving{ opacity:0; transform:scale(1.08); pointer-events:none; }

  #intro .burst{
    position:absolute; width:140vmax; height:140vmax;
    background:conic-gradient(from 0deg,
      var(--rosa), var(--celeste), var(--rosa-deep), var(--celeste-deep), var(--rosa));
    animation: burstspin 8s linear infinite, burstpulse 3.4s ease-in-out infinite;
    filter: blur(60px);
    opacity:.55;
  }
  @keyframes burstspin{ to{ transform:rotate(360deg); } }
  @keyframes burstpulse{ 0%,100%{ opacity:.35;} 50%{ opacity:.6; } }

  #intro .veil{
    position:absolute; inset:0;
    background:radial-gradient(circle at center, transparent 0%, var(--ink-dark) 72%);
  }

  #intro .content{
    position:relative; z-index:2;
    text-align:center;
    padding:0 24px;
  }

  .intro-line{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-style:italic;
    font-size:clamp(1.2rem, 4vw, 2rem);
    color:#e4d8f2;
    opacity:0;
    position:absolute;
    left:0; right:0;
    transform:translateY(10px);
  }
  .intro-line.l1{ animation: lineinout 1.6s ease forwards; animation-delay:.3s; }
  .intro-line.l2{ animation: lineinout 1.6s ease forwards; animation-delay:2.0s; }
  @keyframes lineinout{
    0%{ opacity:0; transform:translateY(10px); }
    20%{ opacity:1; transform:translateY(0); }
    80%{ opacity:1; transform:translateY(0); }
    100%{ opacity:0; transform:translateY(-10px); }
  }

  .intro-title{
    font-family:'Fraunces', serif;
    font-weight:800;
    font-size:clamp(2.2rem, 7vw, 4.6rem);
    line-height:1.02;
    color:#fff;
    opacity:0;
    transform:scale(.85);
    animation: titlein .9s cubic-bezier(.2,.9,.25,1.2) forwards;
    animation-delay:3.7s;
  }
  .intro-title .accent{
    font-style:italic; font-weight:600;
    background:linear-gradient(90deg, var(--rosa), var(--celeste));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  @keyframes titlein{
    to{ opacity:1; transform:scale(1); }
  }

  #skip-intro{
    position:absolute; top:20px; right:20px; z-index:3;
    background:rgba(255,255,255,.1);
    border:1px solid rgba(255,255,255,.25);
    color:#e4d8f2;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:.08em;
    padding:9px 14px;
    border-radius:999px;
    cursor:pointer;
  }
  #skip-intro:hover{ color:#fff; border-color:var(--rosa); }

  @media (max-width:600px){
    .intro-line{ position:static; margin-bottom:0; }
  }

  #selector{
    position:relative; z-index:1;
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:32px 20px 48px;
    opacity:0;
    transition:opacity .8s ease;
  }
  #selector.visible{ opacity:1; }

  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--celeste-deep);
    margin-bottom:10px;
  }

  .stage{
    position:relative;
    display:flex; align-items:center; justify-content:center;
    gap:22px;
    width:100%;
    max-width:760px;
  }

  .arrow{
    flex:0 0 auto;
    width:56px; height:56px;
    border-radius:50%;
    border:1px solid var(--card-edge);
    background:var(--card);
    color:var(--ink-text);
    font-size:20px;
    box-shadow:0 8px 20px -10px rgba(160,80,140,.35);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition:border-color .25s ease, transform .15s ease;
  }
  .arrow:hover{ border-color:var(--accent); transform:translateY(-2px); }
  .arrow:active{ transform:translateY(0) scale(.94); }

  .character{
    text-align:center;
    width:min(400px, 74vw);
  }

  .code-label{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    letter-spacing:.12em;
    color: var(--accent);
    margin-bottom:8px;
    transition:opacity .2s ease, color .3s ease;
  }

  .char-name{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:clamp(1.7rem, 4.6vw, 2.5rem);
    margin:0 0 6px;
    min-height:1.3em;
    color:var(--ink-text);
    transition:opacity .2s ease;
  }

  .character-visual{
    position:relative;
    height:min(460px, 54vh);
    margin:18px auto 4px;
    display:flex;
    align-items:flex-end;
    justify-content:center;
  }

  .char-flash{
    position:absolute; inset:-10%;
    border-radius:50%;
    background: radial-gradient(circle, var(--accent) 0%, transparent 62%);
    opacity:0;
    transform:scale(.6);
    pointer-events:none;
    z-index:1;
  }
  .char-flash.pop{
    animation: flashpop .6s ease-out;
  }
  @keyframes flashpop{
    0%{ opacity:.65; transform:scale(.55); }
    100%{ opacity:0; transform:scale(1.35); }
  }

  .light-floor{
    position:absolute;
    left:50%; bottom:6%;
    width:80%;
    height:32px;
    transform:translateX(-50%);
    border-radius:50%;
    background: radial-gradient(ellipse at center, var(--accent) 0%, transparent 72%);
    filter:blur(5px);
    animation: floorpulse 2.2s ease-in-out infinite;
    transition: background .3s ease;
  }
  @keyframes floorpulse{
    0%,100%{ opacity:.6; transform:translateX(-50%) scale(.96); }
    50%{ opacity:1; transform:translateX(-50%) scale(1.07); }
  }

  .light-beam{
    position:absolute;
    left:50%; bottom:8%;
    width:135%; height:94%;
    transform:translateX(-50%);
    background: conic-gradient(from 180deg at 50% 100%, transparent 40%, var(--accent) 50%, transparent 60%);
    opacity:.3;
    filter:blur(6px);
    animation: beamsway 3.2s ease-in-out infinite;
    pointer-events:none;
    transition: background .3s ease;
  }
  @keyframes beamsway{
    0%,100%{ opacity:.22; }
    50%{ opacity:.4; }
  }

  .ring-pulse{
    position:absolute;
    left:50%; bottom:9%;
    width:54%;
    aspect-ratio:3/1;
    border-radius:50%;
    border:2px solid var(--ring-color, var(--accent));
    transform:translateX(-50%) scale(.6);
    opacity:.75;
    animation: ringpulse 2.6s ease-out infinite;
  }
  .ring-pulse.d2{ animation-delay:.55s; }
  .ring-pulse.d3{ animation-delay:1.1s; }
  .ring-pulse.d4{ animation-delay:1.65s; }
  .ring-pulse.d5{ animation-delay:2.2s; }
  @keyframes ringpulse{
    0%{ transform:translateX(-50%) scale(.45); opacity:.8; }
    100%{ transform:translateX(-50%) scale(1.9); opacity:0; }
  }

  .sparkle{
    position:absolute;
    left:50%; top:55%;
    font-size:16px;
    line-height:1;
    pointer-events:none;
    transform:translate(-50%,-50%) translate(0,0) scale(0);
    opacity:1;
    animation: sparkle-pop .75s ease-out forwards;
    z-index:3;
  }
  @keyframes sparkle-pop{
    0%{ transform:translate(-50%,-50%) translate(0,0) scale(0) rotate(0deg); opacity:1; }
    55%{ opacity:1; }
    100%{ transform:translate(-50%,-50%) translate(var(--tx), var(--ty)) scale(1) rotate(90deg); opacity:0; }
  }

  .char-photo{
    position:relative;
    z-index:2;
    max-height:100%;
    max-width:100%;
    width:auto;
    display:block;
    object-fit:contain;
    filter: drop-shadow(0 20px 26px rgba(120,60,110,.35));
    transition:opacity .22s ease, transform .3s ease;
  }
  .char-photo.swap-left{ opacity:0; transform:translateX(-26px) scale(.96); }
  .char-photo.swap-right{ opacity:0; transform:translateX(26px) scale(.96); }

  .char-desc{
    color:var(--dim-text);
    font-size:.95rem;
    line-height:1.5;
    min-height:2.6em;
    margin-top:6px;
    transition:opacity .2s ease;
  }

  .dots{
    display:flex; gap:8px; justify-content:center;
    margin-top:22px;
  }
  .dot{
    width:8px; height:8px; border-radius:50%;
    background:var(--card-edge);
    cursor:pointer;
    transition:background .25s ease, transform .25s ease;
    border:none; padding:0;
  }
  .dot.active{ background:var(--accent); transform:scale(1.25); }

  .hint{
    margin-top:22px;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--dim-text);
    opacity:.85;
  }

  @media (max-width:520px){
    .stage{ gap:10px; }
    .arrow{ width:46px; height:46px; font-size:17px; }
  }

  footer{
    position:relative; z-index:1;
    padding:0 0 28px;
    text-align:center;
    color:var(--dim-text);
    font-size:.82rem;
    font-family:'JetBrains Mono', monospace;
  }
  footer strong{ color:var(--ink-text); font-family:'Space Grotesk', sans-serif; }

  @media (prefers-reduced-motion: reduce){
    #intro .burst{ animation:none; }
    .intro-line, .intro-title{ animation:none !important; opacity:1 !important; transform:none !important; }
    .light-floor, .light-beam, .ring-pulse, .bokeh span{ animation:none; }
    .sparkle, .char-flash{ display:none; }
  }

  a:focus-visible, button:focus-visible{
    outline:2px solid var(--celeste-deep);
    outline-offset:3px;
  }
</style>
</head>
<body>
<div class="bokeh"><span></span><span></span><span></span><span></span><span></span></div>

<div id="intro">
  <div class="burst"></div>
  <div class="veil"></div>
  <button id="skip-intro">SALTAR INTRO</button>
  <div class="content">
    <p class="intro-line l1">En algún rincón del multiverso...</p>
    <p class="intro-line l2">...Tiny ya está viviendo mil vidas a la vez.</p>
    <h1 class="intro-title">El <span class="accent">multiverso</span><br>de Tiny</h1>
  </div>
</div>

<div id="selector">
  <div class="eyebrow">Elige un universo</div>

  <div class="stage">
    <button class="arrow" id="prevBtn" aria-label="Universo anterior">&#10094;</button>

    <div class="character">
      <div class="code-label" id="codeLabel"></div>
      <h2 class="char-name" id="charName"></h2>

      <div class="character-visual" id="visual">
        <div class="char-flash" id="flash"></div>
        <div class="light-beam" id="lightBeam"></div>
        <div class="ring-pulse" id="ring1"></div>
        <div class="ring-pulse d2" id="ring2"></div>
        <div class="ring-pulse d3" id="ring3"></div>
        <div class="ring-pulse d4" id="ring4"></div>
        <div class="ring-pulse d5" id="ring5"></div>
        <div class="light-floor" id="lightFloor"></div>
        <img class="char-photo" id="charImg" src="" alt="">
      </div>

      <p class="char-desc" id="charDesc"></p>
    </div>

    <button class="arrow" id="nextBtn" aria-label="Siguiente universo">&#10095;</button>
  </div>

  <div class="dots" id="dots"></div>
  <p class="hint">Usa las flechas, las teclas &#8592; &#8594; o desliza el dedo</p>
</div>

<footer>Catálogo mantenido por quien más la quiere: Polciño. <strong>Tiny</strong> aprueba (probablemente) cada versión de sí misma.</footer>

<script>
  const universos = [
    { code: "UNIVERSO-001", nombre: "Tiny Astronauta",  desc: "Explorando galaxias para escapar de los baños terapeuticos.", foto: "img/Astronauta.png" },
    { code: "UNIVERSO-002", nombre: "Tiny Pirata",      desc: "Capitana del sillón, pero de su propio sillón.", foto: "img/Pirata.png" },
    { code: "UNIVERSO-003", nombre: "Tiny Superheroína",   desc: "Salvando a Polciño, pero de decir algo torpe que moleste a Clau.", foto: "img/Superheroe.png" },
    { code: "UNIVERSO-004", nombre: "Tiny Maga",         desc: "La única capaz de escapar de los cohetes.", foto: "img/Mago.png" },
    { code: "UNIVERSO-005", nombre: "Tiny Vaquera",      desc: "No sé qué poner aquí jsjs (te quiero preciosa hermosa Clau)", foto: "img/vaquero.png" },
    { code: "UNIVERSO-006", nombre: "Tiny Reina",          desc: "Su majestad exige pollito de inmediato.", foto: "img/Rey.png" },
    { code: "UNIVERSO-007", nombre: "Tiny Detective",    desc: "Resolviendo el misterio del caminar de Polciño.", foto: "img/Detective.png" },
    { code: "UNIVERSO-008", nombre: "Tiny Dinosaurio",   desc: "Peligrosa y feroz... casi tanto como su dueña cuando está mal humor.", foto: "img/Dinosaurio.png" },
    { code: "UNIVERSO-009", nombre: "Tiny Ninja",        desc: "Sigiloso, veloz, imparable frente a las galletas.", foto: "img/Ninja.png" },
    { code: "UNIVERSO-010", nombre: "Tiny Navideña",     desc: "Trae regalos... y también los pide.", foto: "img/Navideño.png" }
  ];

  /* ---------- precarga silenciosa de las 10 fotos ----------
     Se piden todas apenas carga la página (durante el intro),
     para que al cambiar de personaje ya estén en caché y no haya
     esperas ni "saltos" al hacer clic en las flechas. No se
     muestran en pantalla, solo se piden en segundo plano. */
  let imagesReady = false;
  const preload = Promise.all(universos.map(u => new Promise((resolve) => {
    const img = new Image();
    img.onload = resolve;
    img.onerror = resolve;
    img.src = u.foto;
  })));
  preload.then(() => { imagesReady = true; });

  function accentFor(i){ return i % 2 === 0 ? 'var(--rosa)' : 'var(--celeste)'; }

  const introEl = document.getElementById('intro');
  const selectorEl = document.getElementById('selector');
  const skipBtn = document.getElementById('skip-intro');

  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function revealSelector(){
    introEl.style.display = 'none';
    selectorEl.classList.add('visible');
  }

  function endIntro(){
    if (introEl.classList.contains('leaving')) return;
    introEl.classList.add('leaving');
    setTimeout(() => {
      /* La página sigue tapada por el fondo del intro mientras se
         desvanece, así que si las fotos aún no terminan de precargar
         (conexiones lentas), esperamos aquí sin que se note nada raro. */
      if (imagesReady){
        revealSelector();
      } else {
        preload.then(revealSelector);
      }
    }, 700);
  }

  skipBtn.addEventListener('click', endIntro);

  if (prefersReducedMotion){
    endIntro();
  } else {
    setTimeout(endIntro, 4900);
  }

  let current = 0;

  const codeLabel  = document.getElementById('codeLabel');
  const charName   = document.getElementById('charName');
  const charDesc   = document.getElementById('charDesc');
  const charImg    = document.getElementById('charImg');
  const lightFloor = document.getElementById('lightFloor');
  const lightBeam  = document.getElementById('lightBeam');
  const flashEl    = document.getElementById('flash');
  const visualEl   = document.getElementById('visual');
  const rings      = [1,2,3,4,5].map(n => document.getElementById('ring' + n));
  const dotsWrap   = document.getElementById('dots');

  function buildDots(){
    dotsWrap.innerHTML = '';
    universos.forEach((u, i) => {
      const d = document.createElement('button');
      d.className = 'dot' + (i === current ? ' active' : '');
      d.style.setProperty('--accent', accentFor(i));
      d.setAttribute('aria-label', 'Ir al universo ' + (i + 1));
      d.addEventListener('click', () => goTo(i));
      dotsWrap.appendChild(d);
    });
  }

  function applyAccent(i){
    const accent = accentFor(i);
    const other = i % 2 === 0 ? 'var(--celeste)' : 'var(--rosa)';
    codeLabel.style.setProperty('--accent', accent);
    lightFloor.style.setProperty('--accent', accent);
    lightBeam.style.setProperty('--accent', accent);
    flashEl.style.setProperty('--accent', accent);
    rings.forEach((r, idx) => {
      r.style.setProperty('--ring-color', idx % 2 === 0 ? accent : other);
    });
  }

  function spawnSparkles(accent){
    const glyphs = ['\u2726','\u2727','\u2733','\u2735'];
    for (let i = 0; i < 10; i++){
      const angle = (360 / 10) * i + (Math.random() * 20 - 10);
      const dist = 90 + Math.random() * 90;
      const rad = angle * Math.PI / 180;
      const tx = Math.cos(rad) * dist;
      const ty = Math.sin(rad) * dist * 0.6 - 20;
      const s = document.createElement('span');
      s.className = 'sparkle';
      s.textContent = glyphs[Math.floor(Math.random() * glyphs.length)];
      s.style.setProperty('--tx', tx.toFixed(0) + 'px');
      s.style.setProperty('--ty', ty.toFixed(0) + 'px');
      s.style.color = accent;
      s.style.fontSize = (12 + Math.random() * 10).toFixed(0) + 'px';
      visualEl.appendChild(s);
      setTimeout(() => s.remove(), 800);
    }
  }

  function triggerFlash(){
    flashEl.classList.remove('pop');
    void flashEl.offsetWidth;
    flashEl.classList.add('pop');
  }

  function render(direction){
    const u = universos[current];
    applyAccent(current);

    if (direction){
      charImg.classList.add(direction === 'next' ? 'swap-left' : 'swap-right');
      charName.style.opacity = 0;
      codeLabel.style.opacity = 0;
      charDesc.style.opacity = 0;
    }

    setTimeout(() => {
      codeLabel.textContent = u.code;
      charName.textContent = u.nombre;
      charDesc.textContent = u.desc;
      charImg.src = u.foto;
      charImg.alt = u.nombre;

      charImg.classList.remove('swap-left', 'swap-right');
      charName.style.opacity = 1;
      codeLabel.style.opacity = 1;
      charDesc.style.opacity = 1;

      triggerFlash();
      spawnSparkles(accentFor(current));
    }, direction ? 180 : 0);

    document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
  }

  function goTo(index){
    const direction = index > current || (current === universos.length - 1 && index === 0) ? 'next' : 'prev';
    current = (index + universos.length) % universos.length;
    render(direction);
  }

  function next(){ goTo((current + 1) % universos.length); }
  function prev(){ goTo((current - 1 + universos.length) % universos.length); }

  document.getElementById('nextBtn').addEventListener('click', next);
  document.getElementById('prevBtn').addEventListener('click', prev);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') next();
    if (e.key === 'ArrowLeft') prev();
  });

  let touchStartX = null;
  const stageEl = document.querySelector('.stage');
  stageEl.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].clientX; }, {passive:true});
  stageEl.addEventListener('touchend', (e) => {
    if (touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 40){ dx < 0 ? next() : prev(); }
    touchStartX = null;
  }, {passive:true});

  buildDots();
  render(null);
</script>
</body>
</html>
